<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎀 如何成为曹静宜的好朋友？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 45px 40px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(233,30,99,0.15);
      position: relative;
      z-index: 10;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .emoji-big {
      font-size: 4rem;
      margin-bottom: 10px;
      animation: bounce 1.5s ease infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.7rem;
      background: linear-gradient(135deg, #e91e63, #f06292);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      line-height: 1.3;
    }
    .progress {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fce4ec;
      transition: all 0.3s;
    }
    .dot.active { background: #e91e63; width: 28px; border-radius: 5px; }
    .dot.done { background: #f48fb1; }
    .question-box {
      display: none;
    }
    .question-box.active { display: block; }
    .question-num {
      font-size: 0.85rem;
      color: #f06292;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option {
      padding: 16px 20px;
      background: #fff5f8;
      border: 2px solid #fce4ec;
      border-radius: 16px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      font-weight: 600;
      color: #444;
    }
    .option:hover {
      background: #fce4ec;
      border-color: #e91e63;
      transform: translateY(-2px);
    }
    .option.correct {
      background: #e8f5e9;
      border-color: #4caf50;
      color: #2e7d32;
    }
    .option.wrong {
      background: #fce4ec;
      border-color: #e91e63;
      color: #c2185b;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .feedback {
      text-align: center;
      padding: 30px 20px;
      display: none;
    }
    .feedback .icon { font-size: 4rem; margin-bottom: 15px; }
    .feedback.wrong .icon { animation: shake 0.5s ease; }
    .feedback h2 { font-size: 1.5rem; margin-bottom: 10px; }
    .feedback.wrong h2 { color: #c2185b; }
    .feedback.correct h2 { color: #2e7d32; }
    .feedback p { color: #666; font-size: 1rem; margin-bottom: 25px; }
    .btn {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #e91e63, #f06292);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,30,99,0.3); }
    .btn-outline {
      background: white;
      color: #e91e63;
      border: 2px solid #e91e63;
      margin-left: 10px;
    }
    .btn-outline:hover { background: #fce4ec; }
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
    .heart {
      position: absolute;
      font-size: 2rem;
      animation: heart-float linear forwards;
      pointer-events: none;
    }
    @keyframes heart-float {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-80vh) scale(1.5);
        opacity: 0;
      }
    }
    .title-emoji {
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="header">
      <div class="emoji-big">💖</div>
      <h1>如何成为曹静宜的好朋友？</h1>
    </div>

    <div class="progress">
      <div class="dot active" id="dot0"></div>
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <!-- 问题1 -->
    <div class="question-box active" id="q0">
      <div class="question-num">第 1 题 · 共 3 题</div>
      <div class="question-text">🎂 曹静宜的生日是？</div>
      <div class="options">
        <div class="option" onclick="checkAnswer(this, false, 0)">6.18</div>
        <div class="option" onclick="checkAnswer(this, false, 0)">7.22</div>
        <div class="option" onclick="checkAnswer(this, true, 0)">8.18</div>
        <div class="option" onclick="checkAnswer(this, false, 0)">9.10</div>
      </div>
    </div>

    <!-- 问题2 -->
    <div class="question-box" id="q1">
      <div class="question-num">第 2 题 · 共 3 题</div>
      <div class="question-text">💃 曹静宜最喜欢的 K-pop 团体是？</div>
      <div class="options">
        <div class="option" onclick="checkAnswer(this, false, 1)">BLACKPINK</div>
        <div class="option" onclick="checkAnswer(this, false, 1)">aespa</div>
        <div class="option" onclick="checkAnswer(this, true, 1)">NewJeans</div>
        <div class="option" onclick="checkAnswer(this, false, 1)">LE SSERAFIM</div>
      </div>
    </div>

    <!-- 问题3 -->
    <div class="question-box" id="q2">
      <div class="question-num">第 3 题 · 共 3 题</div>
      <div class="question-text">📚 曹静宜的学号后两位是？</div>
      <div class="options">
        <div class="option" onclick="checkAnswer(this, false, 2)">07</div>
        <div class="option" onclick="checkAnswer(this, false, 2)">11</div>
        <div class="option" onclick="checkAnswer(this, true, 2)">02</div>
        <div class="option" onclick="checkAnswer(this, false, 2)">25</div>
      </div>
    </div>

    <!-- 失败反馈 -->
    <div class="feedback wrong" id="feedbackWrong">
      <div class="icon">😢</div>
      <h2>对不起，你不能当曹静宜的好朋友</h2>
      <p>答错啦～看来还要多了解一下她哦 💔</p>
      <button class="btn btn-primary" onclick="restart()">🔄 再试一次</button>
    </div>

    <!-- 成功反馈 -->
    <div class="feedback correct" id="feedbackCorrect">
      <div class="icon">🎉</div>
      <h2>恭喜你成为曹静宜的好朋友！</h2>
      <p>你真的太了解她了！快去和她打招呼吧～ 💖</p>
      <button class="btn btn-primary" onclick="restart()">🔄 再玩一次</button>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    let currentQ = 0;
    const total = 3;

    function updateDots() {
      for (let i = 0; i < total; i++) {
        const dot = document.getElementById('dot' + i);
        dot.className = 'dot';
        if (i < currentQ) dot.classList.add('done');
        else if (i === currentQ) dot.classList.add('active');
      }
    }

    function showQuestion(index) {
      document.querySelectorAll('.question-box').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      updateDots();
    }

    function checkAnswer(el, correct, qIndex) {
      if (!correct) {
        el.classList.add('wrong');
        // 同时显示正确答案
        const siblings = el.parentElement.querySelectorAll('.option');
        siblings.forEach(sib => {
          if (sib.onclick.toString().includes('true')) {
            setTimeout(() => sib.classList.add('correct'), 400);
          }
        });
        setTimeout(() => {
          document.getElementById('q' + qIndex).classList.remove('active');
          document.getElementById('feedbackWrong').style.display = 'block';
        }, 900);
      } else {
        el.classList.add('correct');
        if (qIndex < total - 1) {
          setTimeout(() => {
            currentQ++;
            showQuestion(currentQ);
          }, 600);
        } else {
          setTimeout(() => {
            document.querySelectorAll('.question-box').forEach(el => el.classList.remove('active'));
            document.getElementById('feedbackCorrect').style.display = 'block';
            launchFireworks();
          }, 600);
        }
      }
    }

    function restart() {
      currentQ = 0;
      document.querySelectorAll('.feedback').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.option').forEach(el => {
        el.classList.remove('correct', 'wrong');
      });
      showQuestion(0);
    }

    function launchFireworks() {
      const container = document.getElementById('confettiContainer');
      const colors = ['#e91e63','#f06292','#ff4081','#ffd54f','#4caf50','#2196f3','#9c27b0','#ff9800','#fff'];

      // 彩色纸屑
      for (let i = 0; i < 120; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
          container.appendChild(confetti);
          setTimeout(() => confetti.remove(), 4000);
        }, i * 20);
      }

      // 爱心上浮
      const hearts = ['💖','💗','💕','💖','✨','🌟','💫'];
      for (let i = 0; i < 25; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.className = 'heart';
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.bottom = '0';
          heart.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
          heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
          container.appendChild(heart);
          setTimeout(() => heart.remove(), 4000);
        }, i * 100);
      }
    }
  </script>
</body>
</html>
